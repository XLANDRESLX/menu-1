<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carta Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --card:#222;
    --accent:#f5a623; --accent2:#e8441a;
    --text:#f0ece4; --muted:#888; --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;}

  /* ── PORTADA ── */
  #portada{
    position:relative;min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;overflow:hidden;padding:40px 20px 130px;
  }
  #portada::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 65% 25%,#e8441a44 0%,transparent 60%),
               radial-gradient(ellipse at 25% 75%,#f5a62333 0%,transparent 55%);
    z-index:0;
  }
  .cover-logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(2.6rem,8.5vw,6rem);line-height:1.05;letter-spacing:3px;
    background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    position:relative;z-index:1;
    filter:drop-shadow(0 4px 24px #f5a62344);
    animation:fadeUp .7s ease both;
  }
  .cover-badge{
    font-size:clamp(.7rem,2.4vw,.95rem);color:var(--muted);margin-top:8px;
    letter-spacing:5px;text-transform:uppercase;
    position:relative;z-index:1;animation:fadeUp .7s .12s ease both;
  }
  .cover-divider{
    width:56px;height:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:2px;margin:22px auto;
    position:relative;z-index:1;animation:fadeUp .7s .22s ease both;
  }
  .cover-meta{
    position:relative;z-index:1;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    animation:fadeUp .7s .32s ease both;
  }
  .cover-lugar{
    font-size:.88rem;color:var(--muted);
    display:none;align-items:center;gap:6px;
  }
  .wa-btn{
    display:none;align-items:center;gap:10px;
    background:#25D366;color:#fff;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
    padding:14px 30px;border-radius:50px;text-decoration:none;margin-top:6px;
    box-shadow:0 8px 32px #25d36640;
    transition:transform .2s,box-shadow .2s;
  }
  .wa-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px #25d36660;}
  .cover-scroll{
    position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
    color:var(--muted);font-size:.75rem;letter-spacing:3px;text-transform:uppercase;z-index:1;
    animation:bounce 2.2s infinite;
  }
  @keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(9px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

  /* ── LOADING ── */
  #loading{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;padding:80px 20px;min-height:50vh;
  }
  .spinner{
    width:50px;height:50px;
    border:4px solid #2a2a2a;border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── ERROR ── */
  #error-msg{display:none;padding:40px 20px;text-align:center;color:#e8441a;font-size:1rem;line-height:1.8;}

  /* ── MENÚ ── */
  #menu{padding:32px 16px 20px;max-width:940px;margin:0 auto;display:none;}
  .section-title{
    font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--accent);
    border-left:4px solid var(--accent2);padding-left:12px;
    margin-bottom:18px;scroll-margin-top:20px;
  }
  .products-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:16px;margin-bottom:42px;
  }
  .product-card{
    background:var(--card);border-radius:var(--radius);
    overflow:hidden;border:1px solid #2a2a2a;
    display:flex;flex-direction:column;
    transition:transform .2s,box-shadow .2s;
  }
  .product-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px #0007;}
  .product-img{
    width:100%;height:160px;background:#1c1c1c;
    display:flex;align-items:center;justify-content:center;
    font-size:3.2rem;flex-shrink:0;
  }
  .product-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .product-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px;}
  .product-name{font-weight:800;font-size:1rem;text-transform:capitalize;color:var(--text);}
  .product-desc{font-size:.82rem;color:var(--muted);line-height:1.55;flex:1;}
  .product-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px;}
  .product-price{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:1px;color:var(--accent);white-space:nowrap;}
  .add-btn{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;border-radius:50px;color:#fff;
    font-weight:800;font-size:.85rem;padding:8px 18px;cursor:pointer;
    transition:opacity .2s,transform .15s;white-space:nowrap;
  }
  .add-btn:hover{opacity:.85;transform:scale(1.05);}

  /* ── NAVBAR BOTTOM ── */
  #navbar{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    display:none;gap:4px;
    background:#191919ee;backdrop-filter:blur(18px);
    border-radius:50px;padding:7px;border:1px solid #2a2a2a;z-index:100;
    max-width:calc(100vw - 28px);overflow-x:auto;scrollbar-width:none;
    box-shadow:0 8px 40px #000b;
  }
  #navbar::-webkit-scrollbar{display:none;}
  .nav-item{
    flex-shrink:0;padding:8px 15px;border-radius:50px;
    font-weight:700;font-size:.8rem;cursor:pointer;
    color:var(--muted);transition:background .2s,color .2s;
    white-space:nowrap;border:none;background:transparent;
  }
  .nav-item.active,.nav-item:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  /* botón carrito — esquina inferior derecha fijo */
  .nav-cart-btn{
    position:fixed;bottom:20px;right:20px;z-index:150;
    display:flex;align-items:center;gap:8px;
    padding:14px 20px;border-radius:50px;
    font-weight:800;font-size:.9rem;cursor:pointer;
    background:#25D366;color:#fff;border:none;
    box-shadow:0 6px 28px #25d36660;
    transition:opacity .2s,transform .2s;
  }
  .nav-cart-btn:hover{opacity:.87;transform:scale(1.05);}
  .cart-badge{
    position:absolute;top:-6px;right:-6px;
    background:#e8441a;color:#fff;border-radius:50%;
    width:22px;height:22px;font-size:.72rem;font-weight:800;
    display:none;align-items:center;justify-content:center;
    border:2px solid var(--bg);
  }

  /* ── CARRITO MODAL ── */
  #cart-overlay{position:fixed;inset:0;background:#000c;z-index:200;display:none;align-items:flex-end;}
  #cart-overlay.open{display:flex;}
  #cart-panel{
    width:100%;max-width:560px;margin:0 auto;
    background:var(--surface);border-radius:28px 28px 0 0;
    padding:24px 20px 36px;max-height:91svh;overflow-y:auto;
    animation:slideUp .28s ease;
  }
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .cart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .cart-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;color:var(--accent);}
  .close-btn{
    background:#2a2a2a;border:none;color:var(--text);
    width:36px;height:36px;border-radius:50%;font-size:1.1rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .cart-items{display:flex;flex-direction:column;gap:12px;margin-bottom:18px;}
  .cart-item{background:var(--card);border-radius:14px;padding:12px;display:flex;align-items:flex-start;gap:10px;}
  .ci-info{flex:1;}
  .ci-name{font-weight:800;font-size:.95rem;text-transform:capitalize;}
  .ci-controls{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .qty-btn{
    background:#333;border:none;color:var(--text);
    width:28px;height:28px;border-radius:50%;font-size:1.1rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .qty-btn:hover{background:var(--accent);}
  .qty-val{font-weight:800;min-width:20px;text-align:center;}
  .ci-price{color:var(--accent);font-weight:800;font-size:.95rem;white-space:nowrap;}
  .ci-note{
    width:100%;margin-top:8px;
    background:#1a1a1a;border:1px solid #333;border-radius:8px;
    padding:7px 10px;color:var(--text);font-size:.8rem;
    font-family:'Nunito',sans-serif;outline:none;transition:border .2s;
  }
  .ci-note:focus{border-color:var(--accent);}
  .ci-note::placeholder{color:#555;}
  .remove-btn{background:none;border:none;color:#e8441a;cursor:pointer;font-size:1.1rem;padding:2px 6px;}
  .form-sec{display:flex;flex-direction:column;gap:12px;margin-bottom:6px;}
  .form-label{font-weight:700;font-size:.82rem;color:var(--muted);display:block;margin-bottom:4px;}
  .form-input,.form-select{
    width:100%;padding:12px 14px;
    background:var(--card);border:1px solid #333;border-radius:12px;
    color:var(--text);font-family:'Nunito',sans-serif;font-size:.95rem;
    outline:none;transition:border .2s;
  }
  .form-input:focus,.form-select:focus{border-color:var(--accent);}
  .form-select option{background:var(--card);}
  .cart-total{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px 0;border-top:1px solid #2a2a2a;margin-top:8px;
  }
  .total-label{font-weight:700;color:var(--muted);}
  .total-val{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--accent);}
  .send-btn{
    width:100%;padding:16px;background:#25D366;
    border:none;border-radius:50px;color:#fff;
    font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;
    cursor:pointer;margin-top:8px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:opacity .2s,transform .15s;
  }
  .send-btn:hover{opacity:.9;transform:scale(1.01);}
  .empty-cart{text-align:center;padding:44px 20px;color:var(--muted);}
  .empty-icon{font-size:3rem;display:block;margin-bottom:12px;}

  /* ── TOAST ── */
  #toast{
    position:fixed;bottom:98px;left:50%;transform:translateX(-50%);
    background:var(--accent);color:#0f0f0f;
    padding:10px 26px;border-radius:50px;
    font-weight:800;font-size:.88rem;
    z-index:400;opacity:0;pointer-events:none;
    transition:opacity .3s;white-space:nowrap;
  }
  #toast.show{opacity:1;}

  @media(max-width:500px){
    .products-grid{grid-template-columns:1fr 1fr;}
    .product-img{height:120px;}
  }
  @media(max-width:340px){.products-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- PORTADA -->
<section id="portada">
  <div class="cover-logo" id="cover-nombre">…</div>
  <div class="cover-badge">Carta Digital</div>
  <div class="cover-divider"></div>
  <div class="cover-meta">
    <div class="cover-lugar" id="cover-lugar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>

    </div>
    <a href="#" id="wa-link" class="wa-btn" target="_blank" rel="noopener">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.116 1.526 5.845L.057 23.619a.75.75 0 00.908.928l5.938-1.553A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.73 9.73 0 01-4.953-1.352l-.355-.21-3.676.961.981-3.584-.231-.369A9.722 9.722 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
      </svg>
      Pedir por WhatsApp
    </a>
  </div>
  <div class="cover-scroll">↓ ver menú</div>
</section>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <span style="color:var(--muted);font-size:.95rem">Cargando carta...</span>
</div>

<!-- ERROR -->
<div id="error-msg"></div>

<!-- MENÚ -->
<div id="menu"></div>

<!-- NAVBAR -->
<nav id="navbar"></nav>

<!-- CARRITO -->
<div id="cart-overlay">
  <div id="cart-panel">
    <div class="cart-header">
      <span class="cart-title">🛒 Tu Pedido</span>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-content"></div>
  </div>
</div>

<!-- BOTÓN CARRITO FIJO -->
<button class="nav-cart-btn" onclick="openCart()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
  </svg>
  Pedido
  <span class="cart-badge" id="cart-badge"></span>
</button>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  ⚙️  ÚNICA CONFIGURACIÓN QUE DEBES CAMBIAR
//  Pega aquí la URL CSV de la hoja de este local
// ─────────────────────────────────────────────
const CSV_URL =
  'https://docs.google.com/spreadsheets/d/e/' +
  '2PACX-1vQS1P9jB5HnKtkHZCeWtqlrPGeMWtgwAWIT4G6jux79_PMSdLf7v5_i7ZFz38TBiqv7lcsCmK1Edxu0' +
  '/pub?gid=0&single=true&output=csv';

// ─────────────────────────────────────────────
//  Emojis por categoría (fallback sin imagen)
// ─────────────────────────────────────────────
const CAT_EMOJI = {
  salchipapa:'🍟', pizza:'🍕', hamburguesa:'🍔', 'perro caliente':'🌭',
  bebida:'🥤', bebidas:'🥤', postre:'🍰', postres:'🍰',
  entrada:'🥗', entradas:'🥗', combo:'🎁', combos:'🎁',
  almuerzo:'🍛', sopa:'🥣', desayuno:'🌅', jugos:'🥤', jugo:'🥤',
  coctel:'🍹', frappe:'🧋', frappé:'🧋', torta:'🎂', tortas:'🎂',
  pasabocas:'🍘', porcion:'🍽️', porción:'🍽️', corte:'✂️', barba:'🧔',
  facial:'💆', color:'🎨', productos:'🛍️', especiales:'⭐',
  picadas:'🫕', mazorcada:'🌽', patacon:'🫓', patacón:'🫓',
  'arepa rellena':'🫓', nugges:'🍗', default:'🍽️'
};

// ─────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────
let empresa  = { nombre:'', lugar:'', telefono:'' };
let menuData = {};  // { Categoria: [filas] }
let cart     = [];

// ─────────────────────────────────────────────
//  INICIO
// ─────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.text();
    const filas = parseCsv(raw);
    buildMenu(filas);
  } catch (err) {
    hideLoading();
    showError('No se pudo cargar la carta.<br><small style="color:#666">' + err.message + '</small>');
  }
}

// ─────────────────────────────────────────────
//  PARSEO CSV
// ─────────────────────────────────────────────
function parseCsv(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];

  const headers = splitLine(lines[0]).map(h => norm(h));
  const ci = key => headers.indexOf(key);

  const I = {
    empresa:     ci('empresa'),
    categoria:   ci('categoria'),
    nombre:      ci('nombre'),
    precio:      ci('precio'),
    descripcion: ci('descripcion'),
    imagen:      ci('imagen'),
    lugar:       ci('lugar'),
    telefono:    ci('telefono'),
    estado:      ci('estado'),
  };

  const filas = [];
  for (let i = 1; i < lines.length; i++) {
    const c = splitLine(lines[i]);
    const g = k => (c[I[k]] || '').trim();
    if (!g('empresa') || !g('categoria') || !g('nombre')) continue;
    filas.push({
      empresa:     g('empresa'),
      categoria:   g('categoria'),
      nombre:      g('nombre'),
      precio:      parseInt(g('precio').replace(/\D/g,'')) || 0,
      descripcion: g('descripcion'),
      imagen:      g('imagen'),
      lugar:       g('lugar'),
      telefono:    g('telefono'),
      estado:      norm(g('estado')),
    });
  }
  return filas;
}

function splitLine(line) {
  const cells = []; let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"')         { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cells.push(cur); cur = ''; continue; }
    cur += ch;
  }
  cells.push(cur);
  return cells;
}

// ─────────────────────────────────────────────
//  CONSTRUIR MENÚ — filtra por la 1ª empresa
// ─────────────────────────────────────────────
function buildMenu(filas) {
  if (!filas.length) { hideLoading(); showError('La hoja no tiene datos.'); return; }

  // La empresa de este local = nombre del primer registro
  const nombreEmpresa = filas[0].empresa;

  // Buscar datos de contacto (primera fila con lugar o teléfono)
  const meta = filas.find(r => norm(r.empresa) === norm(nombreEmpresa) && (r.lugar || r.telefono)) || filas[0];
  empresa = { nombre: nombreEmpresa, lugar: meta.lugar, telefono: meta.telefono };

  // Filtrar filas de esta empresa y sin estado Desactivado
  menuData = {};
  filas
    .filter(r => norm(r.empresa) === norm(nombreEmpresa) && r.estado !== 'desactivado')
    .forEach(r => {
      if (!menuData[r.categoria]) menuData[r.categoria] = [];
      menuData[r.categoria].push(r);
    });

  if (!Object.keys(menuData).length) {
    hideLoading();
    showError('No hay productos activos para mostrar.');
    return;
  }

  renderPortada();
  renderMenu();
  renderNavbar();
  hideLoading();
  document.getElementById('menu').style.display = 'block';
  document.getElementById('navbar').style.display = 'flex';
  setupObserver();
  updateBadge(); // mostrar badge si había carrito guardado
}

// ─────────────────────────────────────────────
//  PORTADA
// ─────────────────────────────────────────────
function renderPortada() {
  document.getElementById('cover-nombre').textContent = empresa.nombre;
  document.title = empresa.nombre + ' · Carta';

  if (empresa.lugar) {
    document.getElementById('lugar-txt').textContent = empresa.lugar;
    document.getElementById('cover-lugar').style.display = 'flex';
  }
  if (empresa.telefono) {
    const num = empresa.telefono.replace(/\D/g,'');
    const wa  = num.startsWith('57') ? num : '57' + num;
    const link = document.getElementById('wa-link');
    link.href = 'https://wa.me/' + wa;
    link.style.display = 'inline-flex';
  }
}

// ─────────────────────────────────────────────
//  MENÚ
// ─────────────────────────────────────────────
function renderMenu() {
  const menu = document.getElementById('menu');
  menu.innerHTML = '';
  Object.entries(menuData).forEach(([cat, prods]) => {
    const sec = document.createElement('section');
    sec.id = 'cat-' + slug(cat);
    sec.innerHTML =
      '<h2 class="section-title">' + cap(cat) + '</h2>' +
      '<div class="products-grid">' + prods.map(p => productCard(p, cat)).join('') + '</div>';
    menu.appendChild(sec);
  });
}

function productCard(p, cat) {
  const emoji = CAT_EMOJI[cat.toLowerCase()] || CAT_EMOJI[norm(cat)] || CAT_EMOJI.default;
  const imgHtml = p.imagen
    ? '<div class="product-img"><img src="' + esc(p.imagen) + '" alt="' + esc(p.nombre) +
      '" loading="lazy" onerror="this.parentElement.innerHTML=\'' + emoji + '\'"></div>'
    : '<div class="product-img">' + emoji + '</div>';

  return '<div class="product-card">' + imgHtml +
    '<div class="product-body">' +
      '<div class="product-name">' + cap(p.nombre) + '</div>' +
      '<div class="product-desc">' + (p.descripcion || '') + '</div>' +
      '<div class="product-footer">' +
        '<span class="product-price">$' + p.precio.toLocaleString('es-CO') + '</span>' +
        '<button class="add-btn" onclick=\'addToCart(' +
          JSON.stringify({nombre:p.nombre, precio:p.precio}) +
        ')\'>+ Agregar</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ─────────────────────────────────────────────
//  NAVBAR
// ─────────────────────────────────────────────
function renderNavbar() {
  const nav  = document.getElementById('navbar');
  const cats = Object.keys(menuData);
  nav.innerHTML =
    cats.map((cat, i) =>
      '<button class="nav-item' + (i===0?' active':'') +
      '" data-slug="' + slug(cat) + '" onclick="scrollToCat(\'' + slug(cat) + '\',this)">' +
      cap(cat) + '</button>'
    ).join('');
}

function scrollToCat(id, btn) {
  document.getElementById('cat-' + id)?.scrollIntoView({behavior:'smooth', block:'start'});
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
}

function setupObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('cat-','');
        document.querySelectorAll('.nav-item').forEach(b =>
          b.classList.toggle('active', b.dataset.slug === id));
      }
    });
  }, {rootMargin:'-40% 0px -55% 0px'});
  document.querySelectorAll('[id^="cat-"]').forEach(s => obs.observe(s));
}

// ─────────────────────────────────────────────
//  PERSISTENCIA localStorage
// ─────────────────────────────────────────────
const LS_CART   = 'carta_cart';
const LS_NOMBRE = 'carta_nombre';
const LS_PAGO   = 'carta_pago';

function saveCart() {
  try { localStorage.setItem(LS_CART, JSON.stringify(cart)); } catch(e) {}
}
function loadCart() {
  try {
    const s = localStorage.getItem(LS_CART);
    if (s) cart = JSON.parse(s);
  } catch(e) { cart = []; }
}
function saveForm() {
  try {
    const n = document.getElementById('f-nombre')?.value || '';
    const p = document.getElementById('f-pago')?.value   || '';
    if (n) localStorage.setItem(LS_NOMBRE, n);
    if (p) localStorage.setItem(LS_PAGO,   p);
  } catch(e) {}
}
function clearStorage() {
  try {
    localStorage.removeItem(LS_CART);
    localStorage.removeItem(LS_NOMBRE);
    localStorage.removeItem(LS_PAGO);
  } catch(e) {}
}

// ─────────────────────────────────────────────
//  CARRITO
// ─────────────────────────────────────────────
function addToCart(product) {
  const item = cart.find(i => i.nombre === product.nombre);
  if (item) item.qty++;
  else cart.push({...product, qty:1, nota:''});
  saveCart();
  updateBadge();
  showToast('✓ ' + cap(product.nombre) + ' agregado');
}

function updateBadge() {
  const total = cart.reduce((s,i) => s+i.qty, 0);
  const b = document.getElementById('cart-badge');
  if (!b) return;
  b.textContent = total;
  b.style.display = total > 0 ? 'flex' : 'none';
}

function openCart()  { document.getElementById('cart-overlay').classList.add('open'); renderCart(); }
function closeCart() { document.getElementById('cart-overlay').classList.remove('open'); }

document.getElementById('cart-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cart-overlay')) closeCart();
});

function renderCart() {
  const cont       = document.getElementById('cart-content');
  const nombrePrev = localStorage.getItem(LS_NOMBRE) || '';
  const pagoPrev   = localStorage.getItem(LS_PAGO)   || '';

  if (!cart.length) {
    cont.innerHTML = '<div class="empty-cart"><span class="empty-icon">🛒</span>Tu carrito está vacío.<br>¡Agrega algo rico!</div>';
    return;
  }
  const total = cart.reduce((s,i) => s+i.precio*i.qty, 0);
  cont.innerHTML =
    '<div class="cart-items">' + cart.map((item,idx) => cartItemHTML(item,idx)).join('') + '</div>' +
    '<div class="form-sec">' +
      '<div><label class="form-label">👤 Nombre del cliente</label>' +
      '<input class="form-input" id="f-nombre" placeholder="Tu nombre completo" autocomplete="name"' +
        ' value="' + esc(nombrePrev) + '" oninput="saveForm()"/></div>' +
      '<div><label class="form-label">💳 Método de pago</label>' +
      '<select class="form-select" id="f-pago" onchange="saveForm()">' +
        '<option value="">Selecciona…</option>' +
        ['Efectivo','Transferencia','Nequi','Daviplata','Tarjeta débito/crédito'].map(op =>
          '<option' + (pagoPrev === op ? ' selected' : '') + '>' + op + '</option>'
        ).join('') +
      '</select></div>' +
    '</div>' +
    '<div class="cart-total">' +
      '<span class="total-label">Total</span>' +
      '<span class="total-val">$' + total.toLocaleString('es-CO') + '</span>' +
    '</div>' +
    '<button class="send-btn" onclick="sendOrder()">' +
      '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.116 1.526 5.845L.057 23.619a.75.75 0 00.908.928l5.938-1.553A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.73 9.73 0 01-4.953-1.352l-.355-.21-3.676.961.981-3.584-.231-.369A9.722 9.722 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>' +
      'Enviar Pedido</button>';

  cart.forEach((item,idx) => {
    const el = document.getElementById('nota-'+idx);
    if (el) el.value = item.nota || '';
  });
}

function cartItemHTML(item, idx) {
  return '<div class="cart-item">' +
    '<div class="ci-info">' +
      '<div class="ci-name">' + cap(item.nombre) + '</div>' +
      '<div class="ci-controls">' +
        '<button class="qty-btn" onclick="changeQty('+idx+',-1)">−</button>' +
        '<span class="qty-val">' + item.qty + '</span>' +
        '<button class="qty-btn" onclick="changeQty('+idx+',1)">+</button>' +
        '<span class="ci-price">$' + (item.precio*item.qty).toLocaleString('es-CO') + '</span>' +
      '</div>' +
      '<input id="nota-'+idx+'" class="ci-note"' +
        ' placeholder="Algo especial? ej: sin cebolla, sencilla sin verdura…"' +
        ' oninput="cart['+idx+'].nota=this.value; saveCart()"/>' +
    '</div>' +
    '<button class="remove-btn" onclick="removeItem('+idx+')">🗑</button>' +
  '</div>';
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  saveCart(); updateBadge(); renderCart();
}
function removeItem(idx) { cart.splice(idx,1); saveCart(); updateBadge(); renderCart(); }

function sendOrder() {
  const nombre = (document.getElementById('f-nombre')?.value||'').trim();
  const pago   =  document.getElementById('f-pago')?.value||'';
  if (!nombre) { showToast('⚠️ Escribe tu nombre'); return; }
  if (!pago)   { showToast('⚠️ Elige método de pago'); return; }
  if (!cart.length) { showToast('⚠️ El carrito está vacío'); return; }

  const total = cart.reduce((s,i) => s+i.precio*i.qty, 0);
  let msg = '🍽️ *PEDIDO - ' + empresa.nombre + '*\n';
  msg += '👤 *Cliente:* ' + nombre + '\n';
  msg += '💳 *Pago:* ' + pago + '\n\n📋 *Productos:*\n';
  cart.forEach(item => {
    msg += '• ' + item.qty + 'x ' + cap(item.nombre) + ' — $' + (item.precio*item.qty).toLocaleString('es-CO');
    if (item.nota) msg += '\n  📝 _' + item.nota + '_';
    msg += '\n';
  });
  msg += '\n💰 *TOTAL: $' + total.toLocaleString('es-CO') + '*';

  const num = empresa.telefono.replace(/\D/g,'');
  const wa  = num.startsWith('57') ? num : '57'+num;
  window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(msg), '_blank');

  // Limpiar carrito al enviar (nombre y pago se conservan para el próximo pedido)
  cart = [];
  clearStorage();
  updateBadge();
  closeCart();
  showToast('✅ Pedido enviado');
}

// ─────────────────────────────────────────────
//  UTILIDADES
// ─────────────────────────────────────────────
function norm(s) {
  return (s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function cap(s)  { return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }
function slug(s) { return norm(s).replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }
function esc(s)  { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function hideLoading() { document.getElementById('loading').style.display='none'; }
function showError(html) {
  const el = document.getElementById('error-msg');
  el.style.display = 'block'; el.innerHTML = html;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), 2300);
}

// ─────────────────────────────────────────────
loadCart();  // restaurar carrito guardado antes de arrancar
init();
</script>
